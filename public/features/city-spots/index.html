<!doctype html><html lang=en>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>City Spots</title>
<meta name=description content="Select a city, search local places, and pin them on the map.">
<script src=../../config/config.js></script>
<link rel=icon type=image/png href=../../media/city-spots-icon.png>

p:14px;animation:cs-fade-up .55s cubic-bezier(.16,1,.3,1)}.city-spots-map-shell{position:relative;overflow:hidden;min-height:0;border-radius:var(--radius-2xl);border:1px solid var(--border);background:var(--surface);backdrop-filter:blur(18px)saturate(160%);-webkit-backdrop-filter:blur(18px)saturate(160%);box-shadow:var(--shadow-lg)}.city-spots-map-shell::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;border-radius:inherit;border:1px solid rgba(255,255,255,.55)}.city-spots-map{width:100%;height:100%;min-height:0;border-radius:inherit}.city-spots-map-overlay{position:absolute;left:14px;top:14px;z-index:3;display:flex;flex-direction:column;gap:.55rem;max-width:min(480px,calc(100% - 28px))}.city-spots-hero{padding:1rem 1.1rem;border-radius:var(--radius-xl);border:1px solid var(--border);background:var(--surface-strong);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:var(--shadow-md);animation:cs-rise-in .45s cubic-bezier(.16,1,.3,1)}.city-spots-kicker{display:inline-flex;align-items:center;gap:.4rem;margin-bottom:.45rem;color:var(--accent-deep);font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase}.city-spots-kicker::before{content:"";width:2.2rem;height:1.5px;border-radius:2px;background:linear-gradient(90deg,var(--accent),rgba(10,138,235,.15))}.city-spots-hero h1{margin:0;font-size:clamp(1.8rem,3.6vw,3rem);font-weight:800;line-height:.95;letter-spacing:-.055em;background:linear-gradient(135deg,var(--ink) 35%,var(--accent-deep) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.city-spots-hero p{margin:.35rem 0 0;max-width:58ch;color:var(--muted);font-size:.84rem;font-weight:450;line-height:1.55}.city-spots-badge-row{display:flex;flex-wrap:wrap;gap:.4rem}.city-spots-chip{display:inline-flex;align-items:center;padding:.35rem .7rem;min-height:2rem;border-radius:999px;border:1px solid var(--border);background:var(--surface-strong);font-size:.75rem;font-wei der-radius:2px}.city-spots-stat span{display:block;color:var(--muted-soft);font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;font-weight:650}.city-spots-stat strong{display:block;margin-top:.22rem;font-size:1.1rem;font-weight:750;letter-spacing:-.02em}.city-spots-section{border:1px solid var(--border);border-radius:var(--radius-xl);background:var(--surface-card);padding:.85rem .9rem;box-shadow:var(--shadow-xs);animation:cs-rise-in .45s cubic-bezier(.16,1,.3,1);animation-fill-mode:both}.city-spots-section:nth-of-type(1){animation-delay:.04s}.city-spots-section:nth-of-type(2){animation-delay:.09s}.city-spots-section:nth-of-type(3){animation-delay:.14s}.city-spots-section__title{display:flex;justify-content:space-between;align-items:center;gap:.6rem;margin-bottom:.6rem}.city-spots-section__title strong{font-size:.9rem;font-weight:750;letter-spacing:-.01em;color:var(--ink)}.city-spots-stack{display:flex;flex-direction:column;gap:.45rem}.city-spots-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-md);background:#fff;color:var(--ink);padding:.6rem .72rem;font:inherit;font-size:.85rem;font-weight:480;outline:none;box-shadow:var(--shadow-xs);transition:border-color .2s ease,box-shadow .2s ease}.city-spots-input::placeholder{color:var(--muted-soft)}.city-spots-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(10,138,235,.1),var(--shadow-xs)}.city-spots-input--static{background:var(--accent-surface);border-color:var(--accent-border);font-weight:580}.city-spots-inline{display:flex;align-items:center;gap:.45rem}.city-spots-inline--between{justify-content:space-between}.city-spots-btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:var(--radius-md);background:#fff;color:var(--ink);padding:.52rem .82rem;font:inherit;font-weight:650;font-size:.82rem;cursor:pointer;white-space:nowrap;transition:all .18s cubic-bezier(.16,1,.3,1);box-shadow:var(--shadow-xs)}.city-spots-btn: bing}.city-spots-item.is-dragging{opacity:.62;transform:scale(.995)}.city-spots-item.is-drop-target{border-color:var(--accent);box-shadow:0 0 0 2px rgba(10,138,235,.16)}.city-spots-item__meta{min-width:0;display:flex;flex-direction:column;gap:.1rem}.city-spots-item__meta strong{font-size:.84rem;font-weight:650;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.city-spots-item__meta span{color:var(--muted-soft);font-size:.73rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.city-spots-route-bar{display:flex;align-items:center;gap:.45rem;margin-top:.25rem}.city-spots-route-info{flex:1;min-width:0;padding:.42rem .6rem;border-radius:var(--radius-md);background:linear-gradient(135deg,rgba(10,138,235,5%),rgba(232,149,10,4%));font-size:.73rem;color:var(--muted);line-height:1.4;border:1px solid rgba(10,138,235,8%)}.city-spots-route-info strong{color:var(--accent-deep);font-weight:750}.city-spots-route-info.is-hidden{display:none}.city-spots-strategy{display:flex;align-items:center;gap:.6rem;padding:.4rem .55rem;border-radius:var(--radius-md);background:rgba(11,18,33,2%);border:1px solid var(--border)}.city-spots-strategy.is-hidden{display:none}.city-spots-strategy__label{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.02em;white-space:nowrap}.city-spots-strategy__radio{display:inline-flex;align-items:center;gap:.25rem;font-size:.75rem;font-weight:600;color:var(--ink);cursor:pointer;white-space:nowrap}.city-spots-strategy__radio input[type=radio]{accent-color:var(--accent);margin:0}.city-spots-strategy--mode{margin-top:.3rem}.city-spots-item__traffic{margin-top:.32rem;padding-top:.32rem;border-top:1px dashed var(--border);font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:.35rem}.city-spots-item__traffic strong{color:var(--accent-deep);font-weight:700}.city-spots-seg-mode{display:inline-flex;align-items:center;gap:.2rem;margin-left:auto;flex-shrink:0}.city-spots-seg-btn{width:1.55rem;height:1.55rem;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;border:1px solid var(--border);background:#fff;font-size:.6rem;line-height:1;cursor:pointer;padding:0;opacity:.45;transition:opacity .15s ease,border-color .15s ease,box-shadow .15s ease}.city-spots-seg-btn:hover{opacity:.85;border-color:var(--accent-border)}.city-spots-seg-btn.sel{opacity:1;border-color:var(--accent);box-shadow:0 0 0 2px rgba(10,138,235,.18)}.city-spots-item--routed{border-left:3px solid var(--accent)}.city-spots-seq-badge{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:1.55rem;height:1.55rem;border-radius:999px;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;font-size:.68rem;font-weight:750;letter-spacing:-.02em;box-shadow:0 3px 10px rgba(10,138,235,.3)}.city-spots-seq-badge--start{background:linear-gradient(135deg,var(--success),var(--success-deep));box-shadow:0 3px 10px rgba(15,169,104,.3)}.city-spots-seq-badge--end{background:linear-gradient(135deg,var(--warning),var(--warning-deep));box-shadow:0 3px 10px rgba(232,149,10,.3)}.city-spots-endpoint-row{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.4rem}.city-spots-endpoint__label{display:flex;align-items:center;gap:.3rem;font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:.22rem;letter-spacing:.02em}.city-spots-endpoint__dot{width:7px;height:7px;border-radius:999px;flex-shrink:0}.city-spots-endpoint__dot--start{background:linear-gradient(135deg,var(--success),var(--success-deep));box-shadow:0 2px 5px rgba(15,169,104,.35)}.city-spots-endpoint__dot--end{background:linear-gradient(135deg,var(--warning),var(--warning-deep));box-shadow:0 2px 5px rgba(232,149,10,.35)}@keyframes cs-fade-up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes cs-rise-in{from{opacity:0;transform:translateY(8px)scale(.99)}to{opacity:1;transform:translateY(0)scale(1)}}@keyframes cs-pulse{0%,100%{box-shadow:0 4px 16px rgba(232,149,10,.45),0 1px 3px rgba(0,0,0,.15)}50%{box-shadow:0 4px 28px rgba(232,149,10,.65),0 1px 3px rgba(0,0,0,.2)}}@media(max-width:1200px){.city-spots-shell{grid-template-columns:1fr}.city-spots-map-shell{min-height:55vh}.city-spots-map{min-height:55vh}.city-spots-panel{max-height:none}}@media(max-width:720px){html,body{overflow:auto}.city-spots-page{padding:10px;height:auto;min-height:100svh}.city-spots-shell{gap:10px}.city-spots-map-shell,.city-spots-panel{border-radius:var(--radius-xl)}.city-spots-inline{flex-direction:column;align-items:stretch}.city-spots-panel__stats{grid-template-columns:1fr}.city-spots-map-overlay{max-width:calc(100% - 20px);left:10px;top:10px}.city-spots-map-toolbar{left:10px;bottom:10px}.city-spots-pending{min-width:0;max-width:calc(100% - 20px);left:10px;top:10px}.city-spots-endpoint-row{grid-template-columns:1fr}}</style>

<body>
<main class=city-spots-page aria-label="City Spots">
<section class=city-spots-shell>
<div class=city-spots-map-shell>
<div class=city-spots-map id=city-spots-map></div>
<div class=city-spots-map-overlay>
<div class=city-spots-hero>
<div class=city-spots-kicker>DIY 地图小工具</div>
<h1>City Spots</h1>
<p>Map-based city place picker. Select a city, search local places, and pin them on the map.</p>
</div>
<div class=city-spots-badge-row>
<span class=city-spots-chip>默认城市：北京</span>
<span class=city-spots-chip>切换城市自动清空点位</span>
<span class=city-spots-chip>沉浸式全屏布局</span>
</div>
</div>
<div class=city-spots-map-toolbar>
<span class=city-spots-map-pill>高德地图服务已连接</span>
<span class=city-spots-map-pill>点击地图选择点位</span>
</div>
<div class="city-spots-pending is-hidden" id=pending-point-panel aria-live=polite>
<div class=city-spots-pending__meta>
<strong id=pending-point-name>待确认点位</strong>
<span id=pending-point-address>请确认是否添加该位置。</span>
</div>
<div class=city-spots-pending__actions>
<button class="city-spots-confirm-btn city-spots-confirm-btn--ok" id=confirm-point type=button aria-label=确认添加点位>√</button>
<button class="city-spots-confirm-btn city-spots-confirm-btn--cancel" id=cancel-point type=button aria-label=取消添加点位>×</button>
</div>
</div>
<p class=city-spots-status id=map-status>地图尚未初始化。</p>
</div>
<aside class=city-spots-panel aria-label="Control panel">
<div class=city-spots-panel__top>
<h2>City Spots</h2>
<p>选择城市并检索地点，快速建立你的收藏点位。</p>
</div>
<div class=city-spots-panel__stats>
<div class=city-spots-stat>
<span>当前城市</span>
<strong id=stat-city>北京</strong>
</div>
<div class=city-spots-stat>
<span>已添加地点</span>
<strong id=stat-pins>0</strong>
</div>
</div>
<div class="city-spots-section city-spots-stack">
<div class=city-spots-section__title>
<strong>城市选择</strong>
<span class=city-spots-help>切换后会清空已添加点</span>
</div>
<div class=city-spots-inline>
<input class="city-spots-input city-spots-input--static" id=city-input type=text placeholder=直接输入城市名，如：西安>
<button class=city-spots-btn id=apply-city type=button>切换城市</button>
</div>
</div>
<div class="city-spots-section city-spots-stack">
<div class=city-spots-section__title>
<strong>地点检索</strong>
<span class=city-spots-help>仅检索当前城市</span>
</div>
<div class=city-spots-inline>
<input class=city-spots-input id=poi-keyword type=text placeholder=输入关键词，如：博物馆、咖啡馆>
<button class="city-spots-btn city-spots-btn--primary" id=search-poi type=button>搜索</button>
</div>
<ul class=city-spots-list id=search-results></ul>
</div>
<div class="city-spots-section city-spots-stack">
<div class=city-spots-section__title>
<strong>已添加地点</strong>
<div style=display:flex;align-items:center;gap:.5rem>
<button class="city-spots-btn city-spots-btn--ghost" id=clear-pins type=button>清空</button>
<button class="city-spots-btn city-spots-btn--ghost" id=optimize-route type=button>生成路线</button>
</div>
</div>
<div class=city-spots-route-bar>
<div class="city-spots-route-info is-hidden" id=route-info></div>
</div>
<div class="city-spots-strategy city-spots-strategy--mode is-hidden" id=route-mode>
<span class=city-spots-strategy__label>默认交通</span>
<label class=city-spots-strategy__radio><input type=radio name=route-mode value=driving checked> 驾车</label>
<label class=city-spots-strategy__radio><input type=radio name=route-mode value=walking> 步行</label>
<label class=city-spots-strategy__radio><input type=radio name=route-mode value=riding> 骑行</label>
</div>
<ul class=city-spots-list id=pinned-places></ul>
</div>
</aside>
