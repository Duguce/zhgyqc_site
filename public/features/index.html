<style>*{box-sizing:border-box}.features-index{--bg:#f8f9fb;--ink:#0f1419;--muted:#5a6370;--accent:#6366f1;--accent-secondary:#8b5cf6;--line:rgba(15, 20, 25, 0.08);--line-subtle:rgba(15, 20, 25, 0.04);--shadow-sm:0 2px 8px rgba(15, 20, 25, 0.06);--shadow-md:0 8px 24px rgba(99, 102, 241, 0.08);--shadow-lg:0 20px 60px rgba(99, 102, 241, 0.12);position:relative;overflow:hidden;padding:0;color:var(--ink);max-width:100%!important;width:100vw;margin:0 calc(-50vw + 50%);min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,var(--bg) 0%,#ffffff 100%)}.features-index::before{content:"";position:fixed;top:-25%;right:-15%;width:50vw;height:50vw;background:radial-gradient(circle,rgba(99,102,241,8%) 0%,transparent 70%);border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0;animation:subtle-float 50s ease-in-out infinite}.features-index::after{content:"";position:fixed;bottom:-20%;left:-10%;width:45vw;height:45vw;background:radial-gradient(circle,rgba(139,92,246,6%) 0%,transparent 70%);border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0;animation:subtle-float-reverse 60s ease-in-out infinite}@keyframes subtle-float{0%,100%{transform:translateY(0)translateX(0)}50%{transform:translateY(-40px)translateX(20px)}}@keyframes subtle-float-reverse{0%,100%{transform:translateY(0)translateX(0)}50%{transform:translateY(30px)translateX(-20px)}}.features-shell{position:relative;z-index:1;width:100%;padding:0 max(2rem,calc((100vw - 1360px)/2));flex-grow:1;display:flex;align-items:center;justify-content:center;min-height:100vh}.features-center{width:min(920px,92vw);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem}.features-title{margin:0;font-size:clamp(2.1rem,7vw,5.4rem);line-height:.94;font-weight:900;letter-spacing:-.06em;white-space:nowrap;color:var(--ink);background:linear-gradient(135deg,#111827 0%,#4349d5 52%,#8b5cf6 100%);-webkit-background-clip:text;-webkit-text-fill-color:t
