<main class="content features-index" role="main">
  <style>
    * {
      box-sizing: border-box;
    }

    .features-index {
      --bg: #edf2ff;
      --ink: #0f1419;
      --muted: #5a6370;
      --accent: #6366f1;
      --accent-secondary: #8b5cf6;
      --accent-warm: #f59e0b;
      --line: rgba(15, 20, 25, 0.08);
      --line-subtle: rgba(15, 20, 25, 0.04);
      --shadow-sm: 0 2px 8px rgba(15, 20, 25, 0.06);
      --shadow-md: 0 8px 24px rgba(99, 102, 241, 0.08);
      --shadow-lg: 0 20px 60px rgba(99, 102, 241, 0.12);
      position: relative;
      overflow: hidden;
      padding: 0;
      color: var(--ink);
      max-width: 100% !important;
      width: 100%;
      margin: 0;
      min-height: calc(100vh - 84px);
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 12% 18%, rgba(99, 102, 241, 0.14) 0%, transparent 36%),
        radial-gradient(circle at 84% 84%, rgba(245, 158, 11, 0.11) 0%, transparent 35%),
        linear-gradient(160deg, #f4f7ff 0%, #f8f9fb 45%, #ffffff 100%);
    }

    .features-index > * {
      position: relative;
      z-index: 1;
    }

    .features-index .features-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(15, 20, 25, 0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 20, 25, 0.022) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 88%);
      pointer-events: none;
      z-index: 0;
    }

    /* Premium background blobs - minimal, elegant */
    .features-index::before {
      content: "";
      position: fixed;
      top: -25%;
      right: -15%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: subtle-float 50s ease-in-out infinite;
    }

    .features-index::after {
      content: "";
      position: fixed;
      bottom: -20%;
      left: -10%;
      width: 45vw;
      height: 45vw;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      animation: subtle-float-reverse 60s ease-in-out infinite;
    }

    @keyframes subtle-float {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-40px) translateX(20px); }
    }

    @keyframes subtle-float-reverse {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(30px) translateX(-20px); }
    }

    .features-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 0;
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 84px);
    }

    .features-center {
      width: min(760px, 88vw);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      padding: 0.5rem 0;
    }

    .features-title {
      margin: 0;
      font-size: clamp(1.95rem, 6vw, 4.6rem);
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: -0.07em;
      white-space: nowrap;
      color: var(--ink);
      background: linear-gradient(135deg, #111827 0%, #4349d5 52%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
      text-shadow: 0 12px 42px rgba(99, 102, 241, 0.22);
    }

    .features-tagline {
      margin: 0;
      font-size: clamp(0.76rem, 1vw, 0.92rem);
      color: var(--muted);
      opacity: 0.85;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: linear-gradient(90deg, rgba(99, 102, 241, 0.1), rgba(245, 158, 11, 0.12));
      border: 1px solid rgba(99, 102, 241, 0.14);
      border-radius: 999px;
      padding: 0.35rem 0.8rem;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1400px) {
      .features-shell {
        padding: 0;
      }
    }

    @media (max-width: 1024px) {
      .features-shell {
        min-height: calc(100vh - 72px);
      }
    }

    @media (max-width: 640px) {
      .features-center {
        gap: 0.65rem;
      }
    }

    /* Theme footer has margin-top: 40px; remove it only for features page. */
    .features-index + .footer {
      margin-top: 0;
    }

    .features-index + .footer::before {
      display: none;
    }
  </style>

  <div class="features-shell">
    <section class="features-center" aria-label="Features home message">
      <h2 class="features-title">Project Overview</h2>
      <p class="features-tagline">Unified entry for projects and experiments</p>
    </section>
  </div>
</main>
